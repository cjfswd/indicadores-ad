# Indicadores AD — Nginx reverse proxy
# Copy to: /etc/nginx/sites-available/indicadores.conf
# Then: ln -s /etc/nginx/sites-available/indicadores.conf /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx
# Then: certbot --nginx -d indicadores.healthmaiscuidados.com

server {
    listen 80;
    server_name indicadores.healthmaiscuidados.com;

    # Redirect HTTP → HTTPS (Certbot will handle this after setup)
    # location / { return 301 https://$host$request_uri; }

    # Uploads directory
    location /uploads/ {
        alias /app/indicadores/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy → Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # File upload limit
        client_max_body_size 10M;
    }

    # Frontend SPA — serve static files
    location / {
        root /app/indicadores/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
